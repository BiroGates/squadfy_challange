version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: squadfy_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge_base
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: squadfy_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - '8080:8080'
    command: start-dev
    # Bash built-in TCP check: zero external tools required.
    # Opens a connection to port 8080 — succeeds as soon as Keycloak accepts connections.
    # The keycloak-init script has its own retry loop for full readiness.
    healthcheck:
      test: ['CMD-SHELL', 'bash -c ": >/dev/tcp/localhost/8080" 2>/dev/null']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Runs once after keycloak is healthy.
  # restart: "no" — never loops. Check logs with: docker compose logs keycloak-init
  keycloak-init:
    image: quay.io/keycloak/keycloak:24.0
    container_name: squadfy_keycloak_init
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./infra/keycloak/init.sh:/init.sh:ro
    entrypoint: ['/bin/bash', '/init.sh']
    environment:
      KC_URL: http://keycloak:8080
    restart: 'no'

  minio:
    image: minio/minio:latest
    container_name: squadfy_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    # MinIO healthcheck using its built-in /minio/health/live endpoint (curl is in the image)
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  # Runs once: creates the bucket.
  minio-init:
    image: minio/mc:latest
    container_name: squadfy_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/squadfy-knowledge &&
        echo 'Bucket ready.'
      "
    restart: 'no'

volumes:
  postgres_data:
  minio_data:
